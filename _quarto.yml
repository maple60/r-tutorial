# Purpose: Define the Japanese source website, live HTML output, shared data resources, and sidebar navigation.
project:
  type: website
  output-dir: _site

website:
  title: "生態学・植物科学のためのBase R"
  sidebar:
    style: docked
    search: true
    contents:
      - text: "概要"
        href: index.qmd
      - section: "基礎"
        contents:
          - text: "ベクトル"
            href: basics/01-vector.qmd
          - text: "データフレーム"
            href: basics/02-data-frame.qmd
          - text: "Base Rの作図"
            href: basics/03-base-plot.qmd
      - section: "練習問題"
        contents:
          - text: "ベクトルの練習"
            href: exercises/01-vector-exercise.qmd

format:
  live-html:
    theme: cosmo
    toc: true
    code-copy: true

lang: ja
engine: knitr

resources:
  - data

webr:
  resources:
    - data/plant_growth.csv
