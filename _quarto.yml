# Purpose: Define the Japanese source book, live HTML output, shared data resources, and chapter order.
project:
  type: book
  output-dir: _site

book:
  title: "生態学・植物科学のためのBase R"
  search: true
  chapters:
    - index.qmd
    - basics/01-basic-operation.qmd
    - exercises/01-basic-operation-exercise.qmd
    - basics/02-types-objects.qmd
    - exercises/02-types-objects-exercise.qmd
    - basics/03-vector.qmd
    - exercises/03-vector-exercise.qmd
    - basics/04-arithmetic-functions.qmd
    - exercises/04-arithmetic-functions-exercise.qmd
    - basics/05-logical.qmd
    - exercises/05-logical-exercise.qmd
    - basics/06-data-frame.qmd
    - exercises/06-data-frame-exercise.qmd
    - basics/07-read-csv.qmd
    - exercises/07-read-csv-exercise.qmd
    - basics/08-subset.qmd
    - exercises/08-subset-exercise.qmd
    - basics/09-aggregate.qmd
    - exercises/09-aggregate-exercise.qmd
    - basics/10-na.qmd
    - exercises/10-na-exercise.qmd
    - basics/11-base-plot.qmd
    - exercises/11-base-plot-exercise.qmd
    - basics/12-small-analysis.qmd
    - exercises/12-small-analysis-exercise.qmd

format:
  live-html:
    theme: cosmo
    toc: true
    code-copy: true
    number-sections: false

lang: ja
engine: knitr

resources:
  - data

webr:
  resources:
    - data/plant_growth.csv
